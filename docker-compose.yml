services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=graphnotelm;Username=postgres;Password=postgres
      - Jwt__Key=change-this-to-a-secure-secret-key-in-production
      - Jwt__Issuer=graphnotelm
      - Jwt__Audience=graphnotelm
      - Jwt__AccessTokenMinutes=15
      - AWS__ServiceURL=http://dynamodb:8000
      - AWS__Region=us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      dynamodb:
        condition: service_started

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: graphnotelm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    volumes:
      - dynamodb_data:/home/dynamodblocal
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal"

volumes:
  postgres_data:
  dynamodb_data:
