services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: graphnotelm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PrimaryDB=Host=postgres;Port=5432;Database=graphnotelm;Username=postgres;Password=postgres
      - Jwt__Key=57ff8cb7-ed21-482d-810b-7e784dfd4ba0
      - Jwt__Issuer=graphnotelm
      - Jwt__Audience=graphnotelm_client
      - Jwt__AccessTokenMinutes=60
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - app

volumes:
  postgres_data:
