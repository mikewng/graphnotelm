services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PrimaryDB=Host=host.docker.internal;Port=5432;Database=graphnotelm;Username=postgres;Password=123456
      - Jwt__Key=57ff8cb7-ed21-482d-810b-7e784dfd4ba0
      - Jwt__Issuer=graphnotelm
      - Jwt__Audience=graphnotelm_client
      - Jwt__AccessTokenMinutes=60

  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    volumes:
      - dynamodb_data:/home/dynamodblocal
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal"

volumes:
  dynamodb_data:
